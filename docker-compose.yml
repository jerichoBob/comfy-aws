services:
  localstack:
    image: localstack/localstack:3.6
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb
      - DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack-init:
    image: amazon/aws-cli:2.17.0
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws --endpoint-url=http://localstack:4566 s3 mb s3://comfy-aws-local || true
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name comfy-jobs \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=status,AttributeType=S \
            AttributeName=created_at,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[
            {
              "IndexName": "status-created_at-index",
              "KeySchema": [
                {"AttributeName": "status", "KeyType": "HASH"},
                {"AttributeName": "created_at", "KeyType": "RANGE"}
              ],
              "Projection": {"ProjectionType": "ALL"}
            }
          ]' || true
        echo "LocalStack resources ready"

  comfyui:
    build:
      context: ./docker/comfyui
    ports:
      - "8188:8188"
    volumes:
      - ./models:/app/models
      - comfyui-output:/app/output
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    depends_on:
      localstack:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - S3_BUCKET=comfy-aws-local
      - DYNAMO_TABLE=comfy-jobs
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - PRESIGNED_URL_ENDPOINT=http://localhost:4566
      - JOB_TIMEOUT_SECONDS=900
      - API_KEYS= # Empty = auth disabled for local dev
    volumes:
      - ./api:/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  comfyui-output:
